# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.2
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --minify \
            --baseURL "https://ai.antoniovfranco.com/"
          echo "=== Public directory contents ==="
          ls -la ./public
          echo "=== Index files ==="
          find ./public -maxdepth 1 -name "index.html"
          # Verify index.html exists
          if [ ! -f ./public/index.html ]; then
            echo "ERROR: public/index.html not found!"
            exit 1
          fi

      - name: Prepare clean deploy directory
        run: |
          rm -rf ./deploy
          mkdir -p ./deploy
          cp -a ./public/. ./deploy/
          echo "=== Deploy directory contents ==="
          ls -la ./deploy/
          echo "=== Checking for index.html ==="
          if [ -f ./deploy/index.html ]; then echo "SUCCESS: index.html found"; else echo "ERROR: index.html NOT found"; fi
          echo "=== Checking for layouts (should be empty) ==="
          ls -la ./deploy/layouts 2>/dev/null || echo "GOOD: No layouts directory"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ./deploy/*
          retention-days: 1
          overwrite: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
